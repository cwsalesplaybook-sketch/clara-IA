<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clara IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&display=swap" rel="stylesheet">
<style>
/* ── BASE ──────────────────────────────────────────────── */
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --purple:     #A543FA;   /* Purple Heart — cor principal */
  --purple-dk:  #59327A;   /* Eminence — roxo escuro */
  --red:        #FF5959;   /* Carnation — vermelho */
  --yellow:     #FFB600;   /* Selective Yellow */
  --magnolia:   #F4EDF7;   /* Magnolia — fundo claro */
  --text:       #1F2937;
  --text-soft:  #6B7280;
  --border:     #E9DFF3;
}

body {
  font-family: 'Nunito', -apple-system, BlinkMacSystemFont, sans-serif;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--magnolia);
  overflow: hidden;
  color: var(--text);
}

/* ── HEADER ────────────────────────────────────────────── */
#header {
  background: linear-gradient(135deg, var(--purple) 0%, var(--purple-dk) 100%);
  padding: 12px 14px;
  display: flex;
  align-items: center;
  gap: 10px;
  color: white;
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(89, 50, 122, 0.3);
}

#avatar {
  width: 38px; height: 38px;
  border-radius: 50%;
  border: 2px solid rgba(255,255,255,0.55);
  overflow: hidden;
  flex-shrink: 0;
  background: rgba(255,255,255,0.15);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
}
#avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

#header-info { flex: 1; min-width: 0; }
#header-name {
  font-size: 15px;
  font-weight: 800;
  letter-spacing: -0.2px;
  line-height: 1.2;
}
#header-status { font-size: 10.5px; opacity: 0.8; margin-top: 1px; font-weight: 500; }

#settings-btn {
  background: rgba(255,255,255,0.18);
  border: none; color: white;
  width: 30px; height: 30px;
  border-radius: 8px; cursor: pointer;
  font-size: 14px; flex-shrink: 0;
  transition: background 0.15s;
}
#settings-btn:hover { background: rgba(255,255,255,0.3); }

/* ── VIEWS ─────────────────────────────────────────────── */
#chat-view     { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#settings-view { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#settings-view.active  { display: flex; }
#chat-view.hidden      { display: none; }

/* ── MESSAGES ──────────────────────────────────────────── */
#messages {
  flex: 1; overflow-y: auto;
  padding: 12px 12px 8px;
  display: flex; flex-direction: column; gap: 9px;
}
#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: #D8BEF5; border-radius: 3px; }

.msg { display: flex; flex-direction: column; max-width: 90%; }
.msg.user { align-self: flex-end; }
.msg.bot  { align-self: flex-start; }

.msg-bubble {
  padding: 9px 13px;
  border-radius: 14px;
  font-size: 13px; font-weight: 500;
  line-height: 1.55;
  white-space: pre-line; word-break: break-word;
}
.msg.user .msg-bubble {
  background: var(--purple);
  color: white;
  border-radius: 14px 14px 3px 14px;
}
.msg.bot .msg-bubble {
  background: white;
  color: var(--text);
  border-radius: 14px 14px 14px 3px;
  box-shadow: 0 1px 4px rgba(89, 50, 122, 0.1);
}

.msg-meta { display: flex; align-items: center; gap: 6px; margin-top: 4px; padding: 0 2px; }

.type-tag {
  font-size: 10px; font-weight: 700;
  padding: 2px 7px; border-radius: 8px;
  letter-spacing: 0.2px;
}
.type-tag.A { background: #EDE0FA; color: var(--purple-dk); }
.type-tag.B { background: #FFE5E5; color: #C0392B; }
.type-tag.C { background: #FFF3CC; color: #8A6000; }

.copy-btn {
  background: none;
  border: 1px solid var(--border);
  border-radius: 5px; padding: 2px 8px;
  font-size: 10.5px; color: var(--text-soft);
  cursor: pointer; font-family: 'Nunito', sans-serif;
  font-weight: 600; transition: all 0.15s;
}
.copy-btn:hover { background: var(--magnolia); color: var(--purple); border-color: #D8BEF5; }

/* ── TYPING ────────────────────────────────────────────── */
.typing-bubble {
  display: flex; gap: 4px; padding: 10px 13px;
  background: white; border-radius: 14px 14px 14px 3px;
  box-shadow: 0 1px 4px rgba(89,50,122,0.1);
  width: fit-content;
}
.typing-bubble span {
  width: 6px; height: 6px;
  background: #D8BEF5; border-radius: 50%;
  animation: pulse 1.3s infinite ease-in-out;
}
.typing-bubble span:nth-child(2) { animation-delay: 0.2s; }
.typing-bubble span:nth-child(3) { animation-delay: 0.4s; }
@keyframes pulse {
  0%,80%,100% { transform: translateY(0); opacity: 0.5; }
  40%          { transform: translateY(-5px); opacity: 1; }
}

/* ── SUGGESTIONS ───────────────────────────────────────── */
#suggestions {
  padding: 7px 10px; background: white;
  border-top: 1px solid var(--border);
  display: flex; gap: 5px;
  overflow-x: auto; scrollbar-width: none;
  flex-shrink: 0;
}
#suggestions::-webkit-scrollbar { display: none; }

.chip {
  background: var(--magnolia);
  color: var(--purple-dk);
  border: 1px solid #D8BEF5;
  border-radius: 16px;
  padding: 4px 11px;
  font-size: 11.5px; font-weight: 700;
  cursor: pointer; white-space: nowrap;
  font-family: 'Nunito', sans-serif;
  transition: background 0.15s, border-color 0.15s;
}
.chip:hover { background: #EDE0FA; border-color: var(--purple); }

/* ── INPUT ─────────────────────────────────────────────── */
#input-area {
  padding: 8px 10px; background: white;
  border-top: 1px solid var(--border);
  display: flex; gap: 7px; align-items: flex-end;
  flex-shrink: 0;
}
#input {
  flex: 1;
  border: 1.5px solid var(--border);
  border-radius: 11px; padding: 8px 12px;
  font-size: 13px; font-family: 'Nunito', sans-serif;
  font-weight: 500;
  outline: none; resize: none;
  max-height: 80px; min-height: 36px;
  line-height: 1.4; color: var(--text);
  background: var(--magnolia);
  transition: border-color 0.2s, background 0.2s;
}
#input:focus { border-color: var(--purple); background: white; }
#input::placeholder { color: #B09EC7; }

#send {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--purple), var(--purple-dk));
  border: none; border-radius: 10px; cursor: pointer;
  color: white; font-size: 16px; flex-shrink: 0;
  transition: opacity 0.15s, transform 0.1s;
  box-shadow: 0 2px 6px rgba(165, 67, 250, 0.35);
}
#send:hover { opacity: 0.9; }
#send:active { transform: scale(0.93); }

/* ── SETTINGS ──────────────────────────────────────────── */
.settings-body { flex: 1; overflow-y: auto; padding: 12px; }

.settings-card {
  background: white; border-radius: 12px;
  padding: 13px; margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(89,50,122,0.08);
}
.settings-card h3 {
  font-size: 12.5px; font-weight: 800;
  color: var(--purple-dk); margin-bottom: 10px;
}

.field { margin-bottom: 8px; }
.field label {
  display: block; font-size: 10.5px; font-weight: 700;
  color: var(--text-soft); margin-bottom: 4px;
  text-transform: uppercase; letter-spacing: 0.4px;
}
.field input, .field textarea, .field select {
  width: 100%; border: 1.5px solid var(--border);
  border-radius: 8px; padding: 7px 10px;
  font-size: 12.5px; font-family: 'Nunito', sans-serif;
  font-weight: 500;
  outline: none; box-sizing: border-box;
  color: var(--text); background: var(--magnolia);
  transition: border-color 0.2s;
}
.field textarea { resize: vertical; min-height: 68px; line-height: 1.45; }
.field input:focus, .field textarea:focus, .field select:focus {
  border-color: var(--purple); background: white;
}

.btn-save {
  width: 100%;
  background: linear-gradient(135deg, var(--purple), var(--purple-dk));
  color: white; border: none; border-radius: 9px;
  padding: 9px; font-size: 13px; font-weight: 800;
  cursor: pointer; font-family: 'Nunito', sans-serif;
  box-shadow: 0 2px 6px rgba(165,67,250,0.3);
  transition: opacity 0.15s;
}
.btn-save:hover { opacity: 0.9; }

.custom-item {
  background: var(--magnolia); border: 1px solid var(--border);
  border-radius: 8px; padding: 9px 10px;
  display: flex; justify-content: space-between;
  align-items: flex-start; gap: 6px; margin-bottom: 6px;
}
.custom-q { font-size: 12px; font-weight: 700; color: var(--purple-dk); margin-bottom: 2px; }
.custom-a { font-size: 11px; color: var(--text-soft); font-weight: 500; }
.del-btn {
  background: none; border: none;
  color: var(--red); cursor: pointer;
  font-size: 14px; opacity: 0.7; flex-shrink: 0;
  transition: opacity 0.15s;
}
.del-btn:hover { opacity: 1; }

.empty-state {
  text-align: center; color: var(--text-soft);
  font-size: 12px; padding: 16px; font-weight: 500;
}

/* ── TOAST ─────────────────────────────────────────────── */
#toast {
  position: fixed; bottom: 64px; left: 50%;
  transform: translateX(-50%) translateY(8px);
  background: var(--purple-dk); color: white;
  padding: 8px 15px; border-radius: 9px;
  font-size: 12px; font-weight: 700; opacity: 0;
  transition: opacity 0.2s, transform 0.2s;
  pointer-events: none; white-space: nowrap; z-index: 999;
  box-shadow: 0 3px 10px rgba(89,50,122,0.35);
}
#toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div id="avatar">
    <img src="icons/icon48.png" alt="Clara IA" onerror="this.parentElement.textContent='✨'">
  </div>
  <div id="header-info">
    <div id="header-name">Clara IA</div>
    <div id="header-status">Assistente Comercial CW</div>
  </div>
  <button id="settings-btn" title="Treinar Clara IA">⚙️</button>
</div>

<!-- CHAT -->
<div id="chat-view">
  <div id="messages"></div>

  <div id="suggestions">
    <button class="chip" data-q="quais são os planos e preços?">💰 Planos</button>
    <button class="chip" data-q="lead achou caro após apresentação">🏹 Caro</button>
    <button class="chip" data-q="lead usa concorrente">🏆 Concorrentes</button>
    <button class="chip" data-q="como funciona a garantia?">🛡️ Garantia</button>
    <button class="chip" data-q="temos totem de autoatendimento?">💻 Totem</button>
    <button class="chip" data-q="lead pede pra mandar pelo WhatsApp">📩 WPP</button>
  </div>

  <div id="input-area">
    <textarea id="input" placeholder="Dúvida, objeção ou situação..." rows="1"></textarea>
    <button id="send">➤</button>
  </div>
</div>

<!-- SETTINGS -->
<div id="settings-view">
  <div class="settings-body">
    <div class="settings-card">
      <h3>➕ Adicionar Conhecimento</h3>
      <div class="field">
        <label>Tipo</label>
        <select id="new-type">
          <option value="A">A — Produto / Preço / Processo</option>
          <option value="B">B — Contorno de Objeção</option>
          <option value="C">C — Direcionamento</option>
        </select>
      </div>
      <div class="field">
        <label>Pergunta / Situação</label>
        <input id="new-q" type="text" placeholder="Ex: como funciona o totem?">
      </div>
      <div class="field">
        <label>Resposta / Script</label>
        <textarea id="new-a" placeholder="Escreva a resposta ou script completo..."></textarea>
      </div>
      <div class="field">
        <label>Palavras-chave (separadas por vírgula)</label>
        <input id="new-tags" type="text" placeholder="Ex: totem, autoatendimento">
      </div>
      <button class="btn-save" id="save-btn">Salvar Entrada</button>
    </div>
    <div class="settings-card">
      <h3>📚 Entradas Personalizadas</h3>
      <div id="custom-list"><div class="empty-state">Nenhuma entrada ainda.</div></div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script src="knowledge_base.js"></script>
<script>
let customEntries = [];
let inSettings = false;

const messagesEl   = document.getElementById('messages');
const inputEl      = document.getElementById('input');
const statusEl     = document.getElementById('header-status');
const toast        = document.getElementById('toast');
const chatView     = document.getElementById('chat-view');
const settingsView = document.getElementById('settings-view');
const settingsBtn  = document.getElementById('settings-btn');

/* storage */
function load(cb) {
  chrome.storage.local.get(['claria_custom'], r => {
    customEntries = (r && r.claria_custom) || [];
    if (cb) cb();
  });
}
function persist() { chrome.storage.local.set({ claria_custom: customEntries }); }

/* toast */
function showToast(msg) {
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2200);
}

/* messages */
function scrollBottom() { messagesEl.scrollTop = messagesEl.scrollHeight; }

function addMsg(text, sender, type) {
  const wrap   = document.createElement('div');
  wrap.className = 'msg ' + sender;
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.textContent = text;
  wrap.appendChild(bubble);

  if (sender === 'bot') {
    const meta = document.createElement('div');
    meta.className = 'msg-meta';
    if (type) {
      const labels = { A: 'Produto', B: 'Objeção', C: 'Direção' };
      const tag = document.createElement('span');
      tag.className = 'type-tag ' + type;
      tag.textContent = labels[type] || type;
      meta.appendChild(tag);
    }
    const copy = document.createElement('button');
    copy.className = 'copy-btn';
    copy.textContent = 'Copiar';
    copy.onclick = () => {
      navigator.clipboard.writeText(text).then(() => {
        copy.textContent = 'Copiado!';
        setTimeout(() => copy.textContent = 'Copiar', 2000);
      }).catch(() => {});
    };
    meta.appendChild(copy);
    wrap.appendChild(meta);
  }
  messagesEl.appendChild(wrap);
  scrollBottom();
}

function showTyping() {
  const d = document.createElement('div');
  d.id = 'typing'; d.className = 'msg bot';
  d.innerHTML = '<div class="typing-bubble"><span></span><span></span><span></span></div>';
  messagesEl.appendChild(d);
  scrollBottom();
}
function hideTyping() { const t = document.getElementById('typing'); if (t) t.remove(); }

/* search */
function answer(text) {
  if (typeof CLARIA_KB === 'undefined')
    return { text: 'Base de conhecimento não carregada.', type: null };
  const r = CLARIA_KB.search(text, customEntries);
  if (!r) return {
    text: 'Não encontrei resposta específica. Tente reformular ou use os atalhos.\n\nDica: descreva a situação com "lead disse que..."',
    type: null
  };
  return { text: r.answer, type: r.type };
}

/* send */
function sendMsg(text) {
  text = text.trim();
  if (!text) return;
  addMsg(text, 'user');
  inputEl.value = '';
  inputEl.style.height = 'auto';
  showTyping();
  setTimeout(() => {
    hideTyping();
    const r = answer(text);
    addMsg(r.text, 'bot', r.type);
  }, 480);
}

/* settings */
function renderList() {
  const list = document.getElementById('custom-list');
  list.innerHTML = '';
  if (!customEntries.length) {
    list.innerHTML = '<div class="empty-state">Nenhuma entrada ainda.</div>';
    return;
  }
  customEntries.forEach((e, i) => {
    const item = document.createElement('div');
    item.className = 'custom-item';
    const safe = s => s.replace(/</g,'&lt;').replace(/>/g,'&gt;');
    item.innerHTML = `
      <div>
        <div class="custom-q">${safe(e.question)}</div>
        <div class="custom-a">${safe(e.answer.substring(0,60))}…</div>
      </div>
      <button class="del-btn" data-i="${i}">🗑</button>`;
    list.appendChild(item);
  });
}

function toSettings() {
  inSettings = true;
  chatView.classList.add('hidden');
  settingsView.classList.add('active');
  settingsBtn.textContent = '💬';
  statusEl.textContent = 'Treinar Clara IA';
  renderList();
}
function toChat() {
  inSettings = false;
  chatView.classList.remove('hidden');
  settingsView.classList.remove('active');
  settingsBtn.textContent = '⚙️';
  statusEl.textContent = 'Assistente Comercial CW';
}

/* welcome */
function welcome() {
  if (messagesEl.children.length > 0) return;
  setTimeout(() => addMsg('Olá, como posso ajudar hoje? 👋', 'bot'), 120);
}

/* events */
settingsBtn.addEventListener('click', () => { if (inSettings) toChat(); else toSettings(); });

document.getElementById('send').addEventListener('click', () => sendMsg(inputEl.value));

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(e.target.value); }
});
inputEl.addEventListener('input', e => {
  e.target.style.height = 'auto';
  e.target.style.height = Math.min(e.target.scrollHeight, 80) + 'px';
});

document.getElementById('suggestions').addEventListener('click', e => {
  const chip = e.target.closest('.chip');
  if (chip) sendMsg(chip.dataset.q);
});

document.getElementById('custom-list').addEventListener('click', e => {
  const btn = e.target.closest('.del-btn');
  if (btn) {
    customEntries.splice(parseInt(btn.dataset.i), 1);
    persist(); renderList();
    showToast('Entrada removida.');
  }
});

document.getElementById('save-btn').addEventListener('click', () => {
  const q = document.getElementById('new-q').value.trim();
  const a = document.getElementById('new-a').value.trim();
  if (!q || !a) { showToast('Preencha pergunta e resposta.'); return; }
  const tags = document.getElementById('new-tags').value.split(',').map(s => s.trim()).filter(Boolean);
  customEntries.push({
    id: 'c_' + Date.now(),
    type: document.getElementById('new-type').value,
    tags, question: q, answer: a, custom: true
  });
  persist();
  document.getElementById('new-q').value = '';
  document.getElementById('new-a').value = '';
  document.getElementById('new-tags').value = '';
  renderList();
  showToast('Entrada salva!');
});

/* init */
load(welcome);
</script>
</body>
</html>
